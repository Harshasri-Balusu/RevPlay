<div class="auth-container d-flex align-items-center justify-content-center min-vh-100">
    <div class="auth-card p-5 rounded-4 shadow-lg w-100" style="max-width: 450px;">
        <h3 class="fw-bold mb-4 text-white">Forgot Password</h3>

        <div *ngIf="error" class="alert alert-danger bg-dark border-danger text-danger mb-4 small">{{ error }}</div>
        <div *ngIf="successMessage" class="alert alert-success bg-dark border-success text-success mb-4 small">{{ successMessage }}</div>

        <form (ngSubmit)="onSubmit()" #forgotForm="ngForm">
            <div class="mb-4">
                <label class="form-label text-muted small fw-bold text-uppercase">Email</label>
                <input type="email" name="email" class="form-control custom-input" [(ngModel)]="email" required
                    placeholder="Enter registered email">
            </div>

            <button type="submit" class="btn btn-primary w-100 rounded-pill py-3 fw-bold text-dark mb-3"
                [disabled]="!forgotForm.form.valid || isLoading">
                <span *ngIf="!isLoading">Send Reset Link</span>
                <span *ngIf="isLoading" class="spinner-border spinner-border-sm"></span>
            </button>
        </form>

        <a routerLink="/auth/login" class="text-muted small text-decoration-none">Back to login</a>
    </div>
</div>
