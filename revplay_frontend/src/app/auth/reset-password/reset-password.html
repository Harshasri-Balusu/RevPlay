<div class="reset-password-page">
    <div class="card reset-card p-4 p-md-5">
        <ng-container *ngIf="resetSuccessful; else nonSuccessState">
            <h2 class="h4 fw-bold mb-3 text-white">Password Updated Successfully</h2>
            <div class="alert alert-success mb-4" role="alert">
                Your password has been updated.
                <br>
                You can now log in with your new password.
            </div>
            <button type="button" class="btn btn-primary w-100" (click)="goToLogin()">Go to Login</button>
        </ng-container>

        <ng-template #nonSuccessState>
            <ng-container *ngIf="invalidOrExpiredToken; else resetFormState">
                <h2 class="h4 fw-bold mb-3 text-white">Reset Link Error</h2>
                <div class="alert alert-danger mb-4" role="alert">
                    Reset link is invalid or expired.
                    <br>
                    Please request a new password reset.
                </div>
                <button type="button" class="btn btn-primary w-100" (click)="goToForgotPassword()">
                    Back to Forgot Password
                </button>
            </ng-container>
        </ng-template>

        <ng-template #resetFormState>
            <h2 class="h4 fw-bold mb-3 text-white">Reset Your Password</h2>
            <div *ngIf="error" class="alert alert-danger mb-3" role="alert">{{ error }}</div>

            <form (ngSubmit)="onSubmit()">
                <div class="mb-3">
                    <label class="form-label text-light" for="newPassword">New Password</label>
                    <input id="newPassword" type="password" name="newPassword" class="form-control"
                        [(ngModel)]="newPassword" required>
                </div>

                <div class="mb-4">
                    <label class="form-label text-light" for="confirmPassword">Confirm Password</label>
                    <input id="confirmPassword" type="password" name="confirmPassword" class="form-control"
                        [(ngModel)]="confirmPassword" required>
                    <small *ngIf="confirmPassword && newPassword !== confirmPassword" class="text-danger">
                        Confirm password must match new password.
                    </small>
                </div>

                <button type="submit" class="btn btn-primary w-100 d-flex justify-content-center align-items-center"
                    [disabled]="isSubmitDisabled">
                    <span *ngIf="!isLoading">Update Password</span>
                    <span *ngIf="isLoading" class="spinner-border spinner-border-sm" role="status"
                        aria-hidden="true"></span>
                </button>
            </form>
        </ng-template>
    </div>
</div>
