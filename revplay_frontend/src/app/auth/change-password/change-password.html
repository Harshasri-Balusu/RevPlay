<div class="auth-container d-flex align-items-center justify-content-center min-vh-100">
    <div class="auth-card p-5 rounded-4 shadow-lg w-100" style="max-width: 450px;">
        <h3 class="fw-bold mb-4 text-white">Change Password</h3>

        <div *ngIf="error" class="alert alert-danger bg-dark border-danger text-danger mb-4 small" role="alert" aria-live="polite">{{ error }}</div>
        <div *ngIf="successMessage" class="alert alert-success bg-dark border-success text-success mb-4 small" role="status" aria-live="polite">{{ successMessage }}</div>

        <form (ngSubmit)="onSubmit()" #changeForm="ngForm">
            <div class="mb-3">
                <label class="form-label text-muted small fw-bold text-uppercase">Current Password</label>
                <input type="password" name="currentPassword" class="form-control custom-input"
                    [(ngModel)]="currentPassword" required>
            </div>

            <div class="mb-4">
                <label class="form-label text-muted small fw-bold text-uppercase">New Password</label>
                <input type="password" name="newPassword" class="form-control custom-input" [(ngModel)]="newPassword"
                    [minlength]="minPasswordLength" required>
                <small class="text-muted d-block mt-1">At least 8 chars with uppercase, lowercase, number, special char.</small>
                <small class="text-danger d-block mt-1" *ngIf="newPassword && !isPasswordStrong()">
                    Password is weak. Please follow all password rules.
                </small>
            </div>

            <div class="mb-4">
                <label class="form-label text-muted small fw-bold text-uppercase">Confirm New Password</label>
                <input type="password" name="confirmNewPassword" class="form-control custom-input"
                    [(ngModel)]="confirmNewPassword" minlength="8" required>
                <small class="text-danger mt-1 d-block" *ngIf="confirmNewPassword && !isPasswordMatch()">
                    Passwords do not match.
                </small>
            </div>

            <button type="submit" class="btn btn-primary w-100 rounded-pill py-3 fw-bold text-dark mb-3"
                [disabled]="!changeForm.form.valid || isLoading || !isPasswordMatch() || !isPasswordStrong()">
                <span *ngIf="!isLoading">Change Password</span>
                <span *ngIf="isLoading" class="spinner-border spinner-border-sm"></span>
            </button>
        </form>

        <a routerLink="/profile" class="text-muted small text-decoration-none">Back to profile</a>
    </div>
</div>
