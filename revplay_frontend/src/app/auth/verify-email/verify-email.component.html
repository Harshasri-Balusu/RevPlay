<div class="verify-email-page">
    <div class="card verify-card p-4 p-md-5">
        <ng-container *ngIf="isVerified; else verifyState">
            <h2 class="h4 fw-bold mb-3 text-white">Email Verified Successfully</h2>
            <div class="alert alert-success mb-4" role="alert">
                Your account has been verified.
                <br>
                You can now log in to RevPlay.
            </div>
            <button type="button" class="btn btn-primary w-100" (click)="goToLogin()">Go to Login</button>
        </ng-container>

        <ng-template #verifyState>
            <h2 class="h4 fw-bold mb-2 text-white">Verify Your Email</h2>
            <p class="text-light-emphasis mb-2">A verification code has been sent to your email.</p>
            <div *ngIf="infoMessage" class="alert alert-success mb-3" role="alert">{{ infoMessage }}</div>

            <div *ngIf="error" class="alert alert-danger mb-3" role="alert">{{ error }}</div>
            <div *ngIf="resendSuccessMessage" class="alert alert-success mb-3" role="alert">{{ resendSuccessMessage }}</div>

            <form (ngSubmit)="verifyEmail()">
                <div class="mb-3">
                    <label class="form-label text-light" for="otp">OTP Code</label>
                    <input id="otp" type="text" name="otp" class="form-control" [(ngModel)]="otp" required
                        (ngModelChange)="onOtpInput($event)" autocomplete="one-time-code" inputmode="numeric"
                        maxlength="6" placeholder="Enter 6-digit code">
                </div>

                <button type="submit"
                    class="btn btn-primary w-100 d-flex justify-content-center align-items-center mb-3"
                    [disabled]="isVerifyDisabled">
                    <span *ngIf="!isVerifying">Verify Email</span>
                    <span *ngIf="isVerifying" class="spinner-border spinner-border-sm" role="status"
                        aria-hidden="true"></span>
                </button>
            </form>

            <button type="button" class="btn btn-outline-light w-100" (click)="resendCode()" [disabled]="isResendDisabled">
                <span *ngIf="!isResending">Resend Code</span>
                <span *ngIf="isResending" class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span>
            </button>
        </ng-template>
    </div>
</div>
